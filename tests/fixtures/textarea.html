<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><title>Fixture: textarea chat</title></head>
  <body style="margin: 0; display: flex; flex-direction: column; height: 100vh">
    <main style="flex: 1"></main>
    <form style="display: flex; gap: 8px; padding: 16px" onsubmit="return false">
      <textarea id="chat" placeholder="Message the assistant" style="flex: 1; height: 60px"></textarea>
      <button type="button" aria-label="Send message">Send</button>
    </form>
  </body>
</html>
