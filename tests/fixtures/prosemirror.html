<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><title>Fixture: contenteditable chat</title></head>
  <body style="margin: 0; display: flex; flex-direction: column; height: 100vh">
    <main style="flex: 1"></main>
    <div style="display: flex; gap: 8px; padding: 16px">
      <div
        id="editor"
        contenteditable="true"
        role="textbox"
        aria-label="Ask anything"
        style="flex: 1; min-height: 60px; border: 1px solid #ccc; padding: 8px"
      ></div>
      <button type="button" aria-label="Send">Send</button>
    </div>
  </body>
</html>
